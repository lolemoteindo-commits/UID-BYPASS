<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UID Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #00ff41;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #00ff41;
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ff4444;
            color: #000;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #222;
            border-radius: 8px;
            font-size: 15px;
            background: #111;
            color: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff41;
        }

        .btn {
            padding: 12px 24px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.danger {
            background: #ff4444;
            color: #fff;
        }

        .user-list {
            margin-top: 20px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-name {
            font-weight: 500;
            color: #fff;
        }

        .user-role {
            font-size: 12px;
            color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .delete-btn {
            padding: 8px 16px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: #000;
        }

        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .result.error {
            display: block;
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .result.success {
            display: block;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Admin Dashboard</h1>
            <div class="nav-links">
                <a href="index.html">UID Manager</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="card">
            <h2>Create License Key</h2>
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <button onclick="createKey('free')" class="btn" style="flex: 1; background: #444;">
                    🔓 Generate FREE Key<br>
                    <small style="font-size: 11px; color: #aaa;">(1 Day Max)</small>
                </button>
                <button onclick="createKey('client')" class="btn" style="flex: 1;">
                    ⭐ Generate CLIENT Key<br>
                    <small style="font-size: 11px; color: #aaa;">(30 Days Max)</small>
                </button>
            </div>
            <div id="addResult" class="result"></div>
            <div id="generatedKey" style="margin-top: 20px; padding: 16px; background: #111; border: 1px solid #00ff41; border-radius: 8px; display: none;">
                <p style="color: #888; font-size: 12px; margin-bottom: 8px;">Generated Key (copy this):</p>
                <p id="keyDisplay" style="color: #00ff41; font-size: 18px; font-weight: 600; font-family: monospace;"></p>
                <p id="keyTypeDisplay" style="color: #666; font-size: 12px; margin-top: 8px;"></p>
            </div>
        </div>

        <div class="card">
            <h2>Manage License Keys</h2>
            <div id="keyList" class="user-list">
                <p style="color: #666; text-align: center;">Loading keys...</p>
            </div>
        </div>
    </div>

    <script>
        // Check if admin is logged in (admin has maxDays >= 30)
        const token = sessionStorage.getItem('authToken');
        const maxDays = parseInt(sessionStorage.getItem('maxDays')) || 0;
        
        if (!token || maxDays < 30) {
            alert('Admin access required!');
            window.location.href = 'login.html';
        }

        // Load license keys
        async function loadKeys() {
            try {
                const response = await fetch('/api/keys', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load keys');
                
                const keys = await response.json();
                displayKeys(keys);
            } catch (error) {
                document.getElementById('keyList').innerHTML = 
                    '<p style="color: #ff4444; text-align: center;">Failed to load keys</p>';
            }
        }

        function displayKeys(keys) {
            const container = document.getElementById('keyList');
            
            if (keys.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center;">No keys found</p>';
                return;
            }
            
            container.innerHTML = keys.map(keyData => {
                const isFree = keyData.keyType === 'free' || keyData.key.startsWith('FREE');
                const typeBadge = isFree 
                    ? '<span style="background: #444; color: #aaa; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px;">FREE</span>'
                    : '<span style="background: #00ff41; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; font-weight: 600;">CLIENT</span>';
                return `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-icon">${isFree ? '🔓' : '⭐'}</div>
                        <div>
                            <div class="user-name" style="font-family: monospace; font-size: 14px;">${keyData.key}</div>
                            <span class="user-role">Max ${keyData.maxDays} days</span>
                            ${typeBadge}
                            <span style="color: #666; font-size: 11px; margin-left: 8px;">${new Date(keyData.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <button onclick="deleteKey('${keyData.key}')" class="delete-btn">Delete</button>
                </div>
            `}).join('');
        }

        // Create key (free or client)
        async function createKey(keyType) {
            const resultDiv = document.getElementById('addResult');
            const keyDisplayDiv = document.getElementById('generatedKey');
            
            try {
                const response = await fetch('/api/keys', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ keyType: keyType })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create key');
                }
                
                resultDiv.className = 'result success';
                resultDiv.textContent = keyType === 'free' ? 'FREE key generated! (1 Day Max)' : 'CLIENT key generated! (30 Days Max)';
                
                // Show generated key
                document.getElementById('keyDisplay').textContent = data.key.key;
                document.getElementById('keyTypeDisplay').textContent = `Type: ${data.key.keyType.toUpperCase()} | Max Days: ${data.key.maxDays}`;
                keyDisplayDiv.style.display = 'block';
                
                // Reload key list
                loadKeys();
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = error.message;
            }
        }

        // Delete key
        async function deleteKey(key) {
            if (!confirm(`Are you sure you want to delete this key?\n\n${key}\n\nDeleted keys cannot be used again!`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/keys/' + encodeURIComponent(key), {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to delete key');
                }
                
                // Reload key list
                loadKeys();
                
            } catch (error) {
                alert(error.message);
            }
        }

        // Logout
        async function logout() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
            } catch (e) {}
            
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // Load keys on page load
        loadKeys();
    </script>
</body>
</html>
